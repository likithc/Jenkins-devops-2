version: '3.8'

services:
  task-tracker:
    image: ${DOCKER_REGISTRY:-localhost:5000}/task-tracker:${IMAGE_TAG:-latest}
    container_name: task-tracker-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
